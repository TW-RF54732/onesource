name: Publish & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build & Upload Assets
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary_name: onesource.exe
            release_name: onesource.exe
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary_name: onesource
            release_name: onesource-linux
          - os: macos-latest
            target: x86_64-apple-darwin
            binary_name: onesource
            release_name: onesource-macos

    steps:
      - uses: actions/checkout@v4

      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Check release notes exist
        id: check_notes
        shell: bash
        run: |
          NOTES_PATH="release_notes/${{ steps.get_version.outputs.VERSION }}_release.md"
          if [ -f "$NOTES_PATH" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "path=$NOTES_PATH" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build Release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare & Upload (Windows)
        if: matrix.os == 'windows-latest'
        run: Move-Item -Path "target\${{ matrix.target }}\release\${{ matrix.binary_name }}" -Destination "${{ matrix.release_name }}"
      - uses: softprops/action-gh-release@v1
        if: matrix.os == 'windows-latest'
        with:
          files: ${{ matrix.release_name }}
          body_path: ${{ steps.check_notes.outputs.exists == 'true' && steps.check_notes.outputs.path || '' }}

      # 針對 Unix (Linux/macOS) 的改名與上傳
      - name: Prepare & Upload (Unix)
        if: matrix.os != 'windows-latest'
        run: mv target/${{ matrix.target }}/release/${{ matrix.binary_name }} ${{ matrix.release_name }}
      - uses: softprops/action-gh-release@v1
        if: matrix.os != 'windows-latest'
        with:
          files: ${{ matrix.release_name }}
          body_path: ${{ steps.check_notes.outputs.exists == 'true' && steps.check_notes.outputs.path || '' }}